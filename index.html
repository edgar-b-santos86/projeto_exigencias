<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Exigências Cartorárias – Registro de Imóveis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
  <header>
    <h1>Exigências Cartorárias – Registro de Imóveis</h1>
  </header>
  <main>
    <section class="controls">
      <input type="text" id="search" placeholder="Buscar exigência..." aria-label="Buscar exigência" />
      <select id="stateFilter" aria-label="Filtrar por UF">
        <option value="">Todas as UFs</option>
        <option value="AC">AC</option>
        <option value="AL">AL</option>
        <option value="AP">AP</option>
        <option value="AM">AM</option>
        <option value="BA">BA</option>
        <option value="CE">CE</option>
        <option value="DF">DF</option>
        <option value="ES">ES</option>
        <option value="GO">GO</option>
        <option value="MA">MA</option>
        <option value="MT">MT</option>
        <option value="MS">MS</option>
        <option value="MG">MG</option>
        <option value="PA">PA</option>
        <option value="PB">PB</option>
        <option value="PR">PR</option>
        <option value="PE">PE</option>
        <option value="PI">PI</option>
        <option value="RJ">RJ</option>
        <option value="RN">RN</option>
        <option value="RS">RS</option>
        <option value="RO">RO</option>
        <option value="RR">RR</option>
        <option value="SC">SC</option>
        <option value="SE">SE</option>
        <option value="SP">SP</option>
        <option value="TO">TO</option>
      </select>
      <select id="cityFilter" aria-label="Filtrar por cidade ou comarca">
        <option value="">Todas as cidades</option>
        <!-- Este campo será populado dinamicamente -->
      </select>
    </section>
    <table id="exigTable">
      <thead>
        <tr>
          <th>UF</th>
          <th>Cidade</th>
          <th>Exigência</th>
          <th>Última atualização</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>SP</td>
          <td>São Paulo</td>
          <td>Cópia autenticada da escritura de compra e venda</td>
          <td>2025-06-10</td>
        </tr>
        <tr>
          <td>SP</td>
          <td>Campinas</td>
          <td>Certidão de matrícula atualizada emitida nos últimos 30 dias</td>
          <td>2025-07-01</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>
      Manutenção:
      <a href="https://github.com/edgar-b-santos86/BANRISUL" target="_blank">GitHub</a>
      • Atualizado em <span id="lastUpdate">2025-07-13</span>
    </p>
  </footer>

  <script>
    const searchInput = document.getElementById("search");
    const stateFilter = document.getElementById("stateFilter");
    const cityFilter = document.getElementById("cityFilter");
    const rows = document.querySelectorAll("#exigTable tbody tr");

    function filter() {
      const query = searchInput.value.toLowerCase();
      const state = stateFilter.value;
      const city = cityFilter.value.toLowerCase();

      rows.forEach((row) => {
        const cells = row.querySelectorAll("td");
        const rowState = cells[0].textContent.trim();
        const rowCity = cells[1].textContent.trim().toLowerCase();
        const text = row.textContent.toLowerCase();

        const matchesQuery = text.includes(query);
        const matchesState = state === "" || rowState === state;
        const matchesCity = city === "" || rowCity === city;

        row.style.display = matchesQuery && matchesState && matchesCity ? "" : "none";
      });
    }

    function populateCities() {
      const selectedState = stateFilter.value;
      const cityOptions = new Set();

      rows.forEach((row) => {
        const cells = row.querySelectorAll("td");
        const rowState = cells[0].textContent.trim();
        const rowCity = cells[1].textContent.trim();
        if (selectedState === "" || rowState === selectedState) {
          cityOptions.add(rowCity);
        }
      });

      cityFilter.innerHTML = '<option value="">Todas as cidades</option>';
      Array.from(cityOptions).sort().forEach((city) => {
        const option = document.createElement("option");
        option.value = city;
        option.textContent = city;
        cityFilter.appendChild(option);
      });
    }

    searchInput.addEventListener("input", filter);
    stateFilter.addEventListener("change", () => {
      populateCities();
      filter();
    });
    cityFilter.addEventListener("change", filter);

    window.addEventListener("DOMContentLoaded", () => {
      populateCities();
    });
  </script>
</body>
</html>
